workflows:

  # ─── Android APK — CodeMagic native build (EAS yok) ───────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      java: 17
      android_signing:
        - harf_balonu_keystore   # CodeMagic > Code signing > Android > ekle

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Expo prebuild (native klasörlerini üret)
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon

      - name: Copy APK
        script: |
          mkdir -p $CM_EXPORT_DIR
          find android/app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} $CM_EXPORT_DIR/harf-balonu-release.apk \;

    artifacts:
      - $CM_EXPORT_DIR/**/*.apk
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true


  # ─── Android AAB — Play Store ─────────────────────────────────────────────
  android-aab:
    name: Android AAB (Play Store)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      java: 17
      android_signing:
        - harf_balonu_keystore

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android --clean --no-install

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon

      - name: Copy AAB
        script: |
          mkdir -p $CM_EXPORT_DIR
          find android/app/build/outputs/bundle/release -name "*.aab" \
            -exec cp {} $CM_EXPORT_DIR/harf-balonu-release.aab \;

    artifacts:
      - $CM_EXPORT_DIR/**/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true


  # ─── iOS IPA ──────────────────────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yourcompany.harfbalonu

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/HarfBalonu.xcworkspace \
            --scheme HarfBalonu

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
